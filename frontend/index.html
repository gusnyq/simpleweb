<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera Monitor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Camera Monitor</h1>
    <form id="add-form">
      <input id="input-id"  type="text" placeholder="Camera ID (e.g. cam0)" required />
      <input id="input-url" type="text" placeholder="MJPEG URL (e.g. http://localhost:8080/stream?topic=/camera/image_raw)" required />
      <button type="submit">Add stream</button>
    </form>
  </header>

  <main id="grid"></main>

  <script src="app.js"></script>
</body>
</html>
