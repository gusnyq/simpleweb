<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera Monitor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="world-canvas"></canvas>

  <header>
    <h1>Camera Monitor</h1>
  </header>

  <main id="grid"></main>

  <!-- Expand modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <span id="modal-title"></span>
        <button id="modal-close">&#x2715;</button>
      </div>
      <div class="modal-waypoints">
        <textarea id="modal-waypoints-input" placeholder='Enter waypoints as JSON, e.g. [{"lat":1.23,"lon":4.56},...]'></textarea>
        <div class="waypoints-row">
          <button id="modal-waypoints-btn">Send</button>
          <span id="modal-waypoints-status"></span>
        </div>
      </div>
      <div class="modal-telemetry">
        <div class="tele-item">
          <span class="tele-label">Battery</span>
          <span id="modal-battery" class="tele-value">—</span>
        </div>
        <div class="tele-item">
          <span class="tele-label">Pods</span>
          <span id="modal-pods" class="tele-value">—</span>
        </div>
        <div class="tele-item">
          <span class="tele-label">GPS</span>
          <span id="modal-gps" class="tele-value">—</span>
        </div>
        <div class="tele-item tele-status-item">
          <span id="modal-status-dot" class="status-dot"></span>
          <span id="modal-status" class="tele-value">—</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
